name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: voice-assist
  IMAGE_REPO: europe-west6-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/gaphunter/voice-assist

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west6-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.IMAGE_REPO }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.IMAGE }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account voice-assist-cloudrun@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --min-instances 1 \
            --max-instances 5 \
            --timeout 3600 \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars "GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_LOCATION=europe-west1,GOOGLE_CALENDAR_ID=${{ secrets.GOOGLE_CALENDAR_ID }},GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }},GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}" \
            --set-secrets "GOOGLE_CALENDAR_REFRESH_TOKEN=GOOGLE_CALENDAR_REFRESH_TOKEN:latest" \
            --project ${{ env.PROJECT_ID }}

      - name: Get service URL and smoke test
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "Service URL: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT
          curl -f "$URL/health"
          gh secret set APP_BASE_URL --repo ${{ github.repository }} --body "$URL" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
